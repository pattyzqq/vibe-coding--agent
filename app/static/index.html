<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Vibe Coding Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .neon-text {
            text-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6, 0 0 30px #3b82f6;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-700 p-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wider">ESP32-S3 <span class="text-blue-400 neon-text">Vibe Coding</span></h1>
        </div>
        <div class="text-slate-400 text-sm">Powered by Doubao-pro-32k</div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Hardware Selection -->
        <aside class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 backdrop-blur">
                <h2 class="text-lg font-semibold text-blue-300 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7 2a1 1 0 00-.707 1.707L7 4.414v3.758a1 1 0 01-.293.707l-4 4C.817 14.761 2.156 18 4.828 18h10.344c2.673 0 4.012-3.239 2.122-5.129l-4-4A1 1 0 0113 8.172V4.414l.707-.707A1 1 0 0013 2H7zm2 6.172V4h2v4.172a3 3 0 00.879 2.12l1.027 1.028a4 4 0 00-2.171.102l-.47.156a4 4 0 01-2.53 0l-.47-.156a4 4 0 00-2.172-.102l1.027-1.028A3 3 0 009 8.172zM7 16a1 1 0 01-1-1v-1.293A5 5 0 018 13h4a5 5 0 012 .707V15a1 1 0 01-1 1H7z" clip-rule="evenodd" />
                    </svg>
                    硬件模块
                </h2>
                <p class="text-xs text-slate-400 mt-1">选择你连接的硬件组件</p>
            </div>
            
            <div id="hardware-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Checkboxes will be injected here -->
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-slate-700 rounded w-3/4"></div>
                        <div class="h-4 bg-slate-700 rounded"></div>
                        <div class="h-4 bg-slate-700 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Center: Chat & Code -->
        <section class="flex-1 flex flex-col min-w-0 bg-slate-900 relative">
            
            <!-- Output Area -->
            <div id="output-area" class="flex-1 overflow-y-auto p-6 space-y-6 pb-32">
                
                <!-- Welcome Message -->
                <div class="card p-6 rounded-xl border-l-4 border-blue-500">
                    <h3 class="text-xl font-bold text-white mb-2">👋 嗨！我是星闪小创客助手</h3>
                    <p class="text-slate-300">告诉我你想做什么，比如 "当有人靠近时亮红灯"，我会帮你生成 MicroPython 代码和接线图！</p>
                </div>

                <!-- Result Container (Hidden by default) -->
                <div id="result-container" class="hidden space-y-6">
                    
                    <!-- Connection Guide -->
                    <div class="card rounded-xl overflow-hidden">
                        <div class="bg-slate-800 p-3 px-4 border-b border-slate-700 flex justify-between items-center">
                            <h4 class="font-semibold text-green-400 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                                </svg>
                                硬件接线
                            </h4>
                        </div>
                        <div class="p-4 bg-slate-900/50 text-sm font-mono text-slate-300 whitespace-pre-wrap" id="connection-output"></div>
                    </div>

                    <!-- Code Block -->
                    <div class="card rounded-xl overflow-hidden flex flex-col">
                        <div class="bg-slate-800 p-3 px-4 border-b border-slate-700 flex justify-between items-center">
                            <h4 class="font-semibold text-yellow-400 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                                MicroPython 代码
                            </h4>
                            <button onclick="copyCode()" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition-colors text-slate-300">
                                复制
                            </button>
                        </div>
                        <div class="relative group">
                            <pre class="p-4 bg-[#0d1117] text-sm font-mono text-slate-300 overflow-x-auto"><code id="code-output" class="language-python"></code></pre>
                        </div>
                    </div>

                    <!-- Mixly Steps -->
                    <div class="card rounded-xl overflow-hidden">
                        <div class="bg-slate-800 p-3 px-4 border-b border-slate-700">
                            <h4 class="font-semibold text-purple-400 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
                                </svg>
                                Mixly 操作步骤
                            </h4>
                        </div>
                        <div class="p-4 bg-slate-900/50 text-sm text-slate-300 whitespace-pre-wrap leading-relaxed" id="mixly-output"></div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur border-t border-slate-700">
                <div class="max-w-4xl mx-auto flex gap-4">
                    <div class="flex-1 relative">
                        <textarea id="user-query" rows="1" 
                            class="w-full bg-slate-800 text-white rounded-xl border border-slate-600 p-4 pr-12 focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none shadow-lg placeholder-slate-500"
                            placeholder="描述你的创意，例如：按下按钮时舵机转动90度..."
                            oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    </div>
                    <button onclick="generateCode()" id="generate-btn"
                        class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform transition hover:scale-105 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span id="btn-text">生成</span>
                        <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                        </svg>
                        <svg id="loading-icon" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Fetch components on load
        async function fetchComponents() {
            try {
                const response = await fetch('/api/v1/esp32/components');
                const components = await response.json();
                const list = document.getElementById('hardware-list');
                list.innerHTML = ''; // Clear loading skeleton

                components.forEach(comp => {
                    const item = document.createElement('label');
                    item.className = 'flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-700/50 cursor-pointer transition-colors group border border-transparent hover:border-slate-600';
                    item.innerHTML = `
                        <input type="checkbox" value="${comp.name}" class="form-checkbox h-5 w-5 text-blue-600 rounded border-slate-600 bg-slate-700 focus:ring-blue-500 focus:ring-offset-slate-800">
                        <span class="text-slate-300 group-hover:text-white select-none">${comp.name}</span>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                console.error('Error fetching components:', error);
                document.getElementById('hardware-list').innerHTML = '<div class="text-red-400 text-sm p-2">加载硬件列表失败</div>';
            }
        }

        async function generateCode() {
            const query = document.getElementById('user-query').value.trim();
            if (!query) return;

            // Get selected modules
            const selectedModules = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                .map(cb => cb.value);

            if (selectedModules.length === 0) {
                alert('请至少选择一个硬件模块哦！');
                return;
            }

            // UI State: Loading
            const btn = document.getElementById('generate-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const loadingIcon = document.getElementById('loading-icon');
            
            btn.disabled = true;
            btnText.textContent = '生成中...';
            btnIcon.classList.add('hidden');
            loadingIcon.classList.remove('hidden');

            try {
                const response = await fetch('/api/v1/esp32/generate-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_query: query,
                        selected_modules: selectedModules
                    })
                });

                if (!response.ok) throw new Error('Generation failed');

                const data = await response.json();
                
                // Show Result
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('connection-output').textContent = data.connection;
                document.getElementById('code-output').textContent = data.micropython_code;
                document.getElementById('mixly-output').textContent = data.mixly_steps;
                
                // Scroll to result
                document.getElementById('output-area').scrollTo({ top: document.getElementById('output-area').scrollHeight, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                alert('生成失败，请稍后再试！');
            } finally {
                // UI State: Reset
                btn.disabled = false;
                btnText.textContent = '生成';
                btnIcon.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
            }
        }

        function copyCode() {
            const code = document.getElementById('code-output').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('代码已复制！');
            });
        }

        // Initialize
        fetchComponents();
    </script>
</body>
</html>
